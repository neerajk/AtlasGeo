name: atlas
channels:
  - conda-forge
  - nodefaults
dependencies:
  - python=3.11
  - pip
  - setuptools>=68
  - wheel
  - pip:
    # Core
    - fastapi>=0.115
    - "uvicorn[standard]>=0.32"
    - websockets>=13
    - pydantic>=2.9
    - pydantic-settings>=2.6
    - python-dotenv>=1.0
    # Agents
    - langchain>=0.3
    - langgraph>=0.2
    - langchain-community>=0.3
    - langchain-openai>=0.2
    - langchain-anthropic>=0.2
    # STAC / Geospatial
    - pystac-client>=0.8
    - pystac>=1.10
    # Tile server (COG streaming)
    - titiler.core>=2.0
    - titiler.application>=2.0
    # Utils
    - httpx>=0.27
    - pyyaml>=6.0
    # Dev
    - pytest>=8
    - pytest-asyncio>=0.24
    - ruff>=0.7
    # Editable install of atlas package
    - "-e ."
