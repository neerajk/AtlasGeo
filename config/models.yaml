# Atlas model routing config.
# Set ATLAS_MODEL_<AGENT> env var to override per-agent at runtime.
# Free models via OpenRouter marked with :free suffix — no cost, just set OPENROUTER_API_KEY.

agents:
  planner:
    # Extracts bbox, date, cloud cover from natural language
    primary: "ollama/nemotron-3-nano:30b-cloud"
    fallback: "ollama/nemotron-3-super:cloud"

  stac_scout:
    # Parses STAC results, may need structured output
    primary: "ollama/nemotron-3-nano:30b-cloud"
    fallback: "ollama/nemotron-3-super:cloud"

  response:
    # Formats final answer for user
    primary: "ollama/nemotron-3-nano:30b-cloud"
    fallback: "ollama/nemotron-3-super:cloud"

# Paid upgrades — uncomment to use:
# planner.primary: "anthropic/claude-sonnet-4-6"
# stac_scout.primary: "google/gemini-2.0-flash"
# response.primary: "anthropic/claude-sonnet-4-6"
