# Atlas model routing config.
# Set ATLAS_MODEL_<AGENT> env var to override per-agent at runtime.
# Free models via OpenRouter marked with :free suffix — no cost, just set OPENROUTER_API_KEY.

agents:
  planner:
    primary: "ollama/gemma4:31b-cloud"
    fallback: "ollama/nemotron-3-nano:30b-cloud"

  stac_scout:
    primary: "ollama/gemma4:31b-cloud"
    fallback: "ollama/nemotron-3-nano:30b-cloud"

  response:
    primary: "ollama/gemma4:31b-cloud"
    fallback: "ollama/nemotron-3-nano:30b-cloud"

# Other options — swap in as needed:
# "openrouter/moonshotai/kimi-k2:free"     — free tier, same model
# "anthropic/claude-sonnet-4-6"            — best accuracy, requires ANTHROPIC_API_KEY
# "openrouter/google/gemini-2.0-flash"     — fast + cheap
